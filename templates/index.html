<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Share — Обмен файлами</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            margin-top: 80px;
        }
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .upload-icon {
            font-size: 4rem;
            color: #667eea;
        }
        .result-link {
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card p-4">
            <div class="text-center mb-4">
                <div class="upload-icon">📁</div>
                <h2 class="mt-3">File Share</h2>
                <p class="text-muted">Загрузи файл и поделись ссылкой</p>
            </div>

            <form id="uploadForm">
                <div class="mb-3">
                    <input type="file" class="form-control form-control-lg" id="fileInput" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-lg">
                    Загрузить файл
                </button>
            </form>

            <div id="result" class="mt-4 d-none">
                <hr>
                <div class="alert alert-success">
                    <strong>Файл загружен!</strong>
                    <p class="mb-2 mt-2">Ссылка для скачивания:</p>
                    <div class="input-group">
                        <input type="text" class="form-control result-link" id="downloadLink" readonly>
                        <button class="btn btn-outline-secondary" type="button" onclick="copyLink()">
                            Копировать
                        </button>
                    </div>
                </div>
            </div>

            <div id="error" class="mt-4 d-none">
                <div class="alert alert-danger" id="errorMessage"></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('Ошибка загрузки');
                }

                const data = await response.json();
                
                document.getElementById('downloadLink').value = data.download_url;
                document.getElementById('result').classList.remove('d-none');
                document.getElementById('error').classList.add('d-none');
                document.getElementById('uploadForm').reset();
            } catch (err) {
                document.getElementById('errorMessage').textContent = err.message;
                document.getElementById('error').classList.remove('d-none');
                document.getElementById('result').classList.add('d-none');
            }
        });

        function copyLink() {
            const linkInput = document.getElementById('downloadLink');
            linkInput.select();
            document.execCommand('copy');
        }
    </script>
</body>
</html>
